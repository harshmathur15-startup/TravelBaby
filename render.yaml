# Render Blueprint — Astro hybrid (SSR + static) with Node.js

services:
  - type: web
    name: travelbaby
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/server/entry.mjs
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SANITY_PROJECT_ID
        sync: false
      - key: SANITY_DATASET
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
